name: cluster-spark

services:
  spark-master:
    container_name: spark-master
    build: .
    image: spark-image
    entrypoint: ['/opt/spark/entrypoint.sh', 'master']
    volumes:
      - .:/app
      - spark-logs:/opt/spark/spark-events
    env_file:
      - .env.spark
    ports:
      - '9090:8080'
      - '7077:7077'

  spark-history:
    container_name: spark-history
    image: spark-image
    entrypoint: ['/opt/spark/entrypoint.sh', 'history']
    depends_on:
      - spark-master
    env_file:
      - .env.spark
    volumes:
      - spark-logs:/opt/spark/spark-events
    ports:
      - '18080:18080'

  spark-worker:
    image: spark-image
    entrypoint: ['/opt/spark/entrypoint.sh', 'worker']
    depends_on:
      - spark-master
    env_file:
      - .env.spark
    volumes:
      - .:/app
      - spark-logs:/opt/spark/spark-events

volumes:
  spark-logs: